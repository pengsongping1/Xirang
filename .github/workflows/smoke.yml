name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Compile
        run: python -m py_compile xirang/*.py scripts/*.py benchmarks/run_bench.py
      - name: Smoke tests
        run: python tests/test_smoke.py
